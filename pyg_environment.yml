name: pyg_env
channels:
  - defaults
dependencies:
  - python=3.13
  - setuptools
  - pip
  - wheel
  - numpy
  - scipy
  - matplotlib
  - pandas
  - pip:
      # PyTorch — cu124 wheels are compatible with CUDA 13.0 driver
      - torch --index-url https://download.pytorch.org/whl/cu124
      - torchvision --index-url https://download.pytorch.org/whl/cu124
      # PyTorch Geometric (scatter/sparse/cluster installed separately after env creation)
      - torch_geometric
      # Protein / structure packages
      - biopython
      - mdanalysis
      - pyvista
      - vtk
      - griddataformats
      - mmtf-python
      - mrcfile
      - scooby
      # Utilities
      - filelock
      - pyyaml
      - tqdm
      - scikit-learn
