# config.template.yaml
#
# Copy this file to config.yaml and fill in the paths for your machine.
# config.yaml is gitignored and should never be committed.
#
# Usage:
#   cp config.template.yaml config.yaml
#   # then edit config.yaml with your local paths

paths:
  # Root directory for all generated protein data (external to the repo)
  # This is where all per-protein subdirectories will be created
  data_root: /path/to/external/data

  # Log file path (can be inside or outside the repo)
  log_file: /path/to/project/logs/pipeline.log

executables:
  # If your conda env is active, the command name alone is sufficient.
  # If not, provide the full path e.g. /home/user/miniconda3/envs/myenv/bin/pdb2pqr
  pdb2pqr: pdb2pqr
  apbs: apbs
  msms: msms

electrostatics:
  forcefield: PARSE        # PARSE, AMBER, CHARMM, etc.
  ph_method: propka        # propka or pdb2pka
  ph_value: 7.0            # physiological pH

surface:
  msms_density: 3.0        # vertices per Å²
  probe_radius: 1.4        # Å — water molecule probe radius

esp_mapping:
  normal_offset: 0.5       # Å — outward normal offset before ESP lookup

logging:
  level: INFO              # DEBUG, INFO, WARNING, ERROR

# Conda environment names used by pipelines/full_pipeline.py.
# Leave as empty string (or omit the section) if both pipelines run in the
# same environment. CLI flags --data-env / --model-env override these values.
environments:
  data_gen: ""             # e.g. protein_esp
  model:    ""             # e.g. pyg_env

# Default model architecture.
# All values can be overridden via CLI flags in pipelines/model_pipeline.py.
features:
  query_curvature: false  # mean curvature scalar on each surface vertex (requires graph rebuild)
  query_normal:    false  # unit surface normal 3-vector on each surface vertex (requires graph rebuild)

model:
  type:                 attention   # distance | attention
  hidden_dim:           128
  n_rbf:                16
  n_heads:              4           # attention model only
  n_bond_radial_rounds: 2
  n_aq_rounds:          3
  n_qq_rounds:          2
  multi_agg:            false       # mean+sum+max aggregation in MessageLayer (no graph rebuild needed)

# Default training hyperparameters.
# All values can be overridden via CLI flags in pipelines/model_pipeline.py.
training:
  epochs:               100
  lr:                   3e-4
  weight_decay:         1e-4
  pearson_weight:       0.1
  clip_grad:            1.0
  lr_patience:          15
  max_edges_per_batch:  200000
  sample_frac:          0.05
  train_frac:           0.8
  val_frac:             0.1
  split_seed:           42